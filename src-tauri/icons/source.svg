<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1220" />
      <stop offset="100%" stop-color="#05080d" />
    </linearGradient>
    <linearGradient id="sz-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="55%" stop-color="#00ff9f" />
      <stop offset="100%" stop-color="#00ff9f" />
    </linearGradient>
    <linearGradient id="hex-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#00ff9f" stop-opacity="0.08" />
    </linearGradient>
    <filter id="outer-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg-grad)" />

  <g transform="translate(512 512) scale(9.2) translate(-50 -50)">
    <circle cx="50" cy="50" r="46" fill="none" stroke="url(#sz-grad)" stroke-width="0.8" stroke-dasharray="2 5" opacity="0.4" />

    <polygon points="50,10 84,29 84,71 50,90 16,71 16,29"
             fill="url(#hex-fill)" stroke="url(#sz-grad)" stroke-width="2.5"
             stroke-linejoin="round" filter="url(#outer-glow)" />

    <polygon points="50,22 74,36 74,64 50,78 26,64 26,36"
             fill="none" stroke="url(#sz-grad)" stroke-width="0.7"
             stroke-linejoin="round" opacity="0.5" />

    <ellipse cx="50" cy="50" rx="13" ry="18" fill="none" stroke="url(#sz-grad)"
             stroke-width="4.5" stroke-linecap="round" filter="url(#outer-glow)" />
    <line x1="36" y1="66" x2="64" y2="34" stroke="url(#sz-grad)"
          stroke-width="4.5" stroke-linecap="round" filter="url(#outer-glow)" />
    <line x1="36" y1="66" x2="64" y2="34" stroke="#ffffff"
          stroke-width="1.3" stroke-linecap="round" opacity="0.65" />

    <circle cx="50" cy="10" r="2" fill="#00ff9f" />
    <circle cx="84" cy="29" r="1.6" fill="#00f3ff" />
    <circle cx="84" cy="71" r="1.6" fill="#00f3ff" />
    <circle cx="50" cy="90" r="2" fill="#00ff9f" />
    <circle cx="16" cy="71" r="1.6" fill="#00f3ff" />
    <circle cx="16" cy="29" r="1.6" fill="#00f3ff" />
  </g>
</svg>

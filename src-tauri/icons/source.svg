<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1826" />
      <stop offset="100%" stop-color="#050709" />
    </linearGradient>
    <linearGradient id="sz-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#00ff9f" />
    </linearGradient>
    <linearGradient id="hex-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#00ff9f" stop-opacity="0.10" />
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg-grad)" />

  <g transform="translate(512 512) scale(9.2) translate(-50 -50)">
    <polygon points="50,8 86,29 86,71 50,92 14,71 14,29"
             fill="url(#hex-fill)" stroke="url(#sz-grad)" stroke-width="5"
             stroke-linejoin="round" />

    <ellipse cx="50" cy="50" rx="14" ry="19" fill="none" stroke="url(#sz-grad)"
             stroke-width="7" stroke-linecap="round" />
    <line x1="34" y1="68" x2="66" y2="32" stroke="url(#sz-grad)"
          stroke-width="7" stroke-linecap="round" />
    <line x1="34" y1="68" x2="66" y2="32" stroke="#ffffff"
          stroke-width="2" stroke-linecap="round" opacity="0.55" />
  </g>
</svg>

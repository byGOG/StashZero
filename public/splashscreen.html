<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
    
    body {
      margin: 0;
      background-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
    }
    
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; -ms-overflow-style: none; }
    
    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 400px;
      height: 350px;
      background-color: #0c0c0c;
      border-radius: 40px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.9), 0 0 50px rgba(0, 255, 159, 0.05);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      animation: zoomIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .logo-section {
      position: relative;
      margin-bottom: 25px;
    }
    
    .logo-container {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .logo-glow {
      position: absolute;
      width: 130px;
      height: 130px;
      background: radial-gradient(circle, rgba(0, 255, 159, 0.2) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      filter: blur(15px);
      animation: pulseGlow 2s ease-in-out infinite;
    }
    
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    }
    
    .logo-main {
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 0 10px rgba(0, 255, 159, 0.5));
    }
    
    .text-section {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .brand-main {
      color: white;
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 4px;
      margin: 0;
      line-height: 1;
      text-shadow: 0 0 20px rgba(0,255,159,0.3);
    }
    
    .brand-sub {
      color: #00ff9f;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 8px;
      margin: 0;
      opacity: 0.9;
    }
    
    .brand-edition {
      color: #00ff9f;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      margin-top: 4px;
      opacity: 0.7;
    }

  </style>
</head>
<body>
  <div class="splash-container">
    <div class="logo-section">
      <div class="logo-glow"></div>
      <div class="logo-container">
        <svg width="90" height="90" viewBox="0 0 100 100" class="logo-main" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00f3ff" />
              <stop offset="55%" stop-color="#00ff9f" />
              <stop offset="100%" stop-color="#00ff9f" />
            </linearGradient>
            <linearGradient id="logo-fill" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.18" />
              <stop offset="100%" stop-color="#00ff9f" stop-opacity="0.06" />
            </linearGradient>
            <filter id="logo-glow-filter" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="2.2" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>

          <circle cx="50" cy="50" r="46" fill="none" stroke="url(#logo-grad)" stroke-width="1" stroke-dasharray="2 5" opacity="0.35" />

          <polygon points="50,10 84,29 84,71 50,90 16,71 16,29"
                   fill="url(#logo-fill)" stroke="url(#logo-grad)" stroke-width="2.5"
                   stroke-linejoin="round" filter="url(#logo-glow-filter)" />

          <polygon points="50,22 74,36 74,64 50,78 26,64 26,36"
                   fill="none" stroke="url(#logo-grad)" stroke-width="0.8"
                   stroke-linejoin="round" opacity="0.45" />

          <ellipse cx="50" cy="50" rx="13" ry="18" fill="none" stroke="url(#logo-grad)"
                   stroke-width="4.5" stroke-linecap="round" filter="url(#logo-glow-filter)" />
          <line x1="36" y1="66" x2="64" y2="34" stroke="url(#logo-grad)"
                stroke-width="4.5" stroke-linecap="round" filter="url(#logo-glow-filter)" />
          <line x1="36" y1="66" x2="64" y2="34" stroke="#ffffff"
                stroke-width="1.3" stroke-linecap="round" opacity="0.6" />

          <circle cx="50" cy="10" r="2" fill="#00ff9f" filter="url(#logo-glow-filter)" />
          <circle cx="84" cy="29" r="1.6" fill="#00f3ff" />
          <circle cx="84" cy="71" r="1.6" fill="#00f3ff" />
          <circle cx="50" cy="90" r="2" fill="#00ff9f" filter="url(#logo-glow-filter)" />
          <circle cx="16" cy="71" r="1.6" fill="#00f3ff" />
          <circle cx="16" cy="29" r="1.6" fill="#00f3ff" />
        </svg>
      </div>
    </div>
    
    <div class="text-section">
      <h1 class="brand-main">StashZero</h1>
    </div>
  </div>
</body>
</html>
